name: Deploy to Cloudflare Pages
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: deps
      - run: npm install
      - run: npm i wrangler
      - run: npm run build
        env:
          PRODUCTION: 1
      - run: npx wrangler pages deploy --project-name ananya-portfolio --branch main --commit-hash "$GITHUB_SHA" --commit-message "$(git show -s --format=%s)" dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
